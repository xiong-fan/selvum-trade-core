server.port=6020
spring.application.name=SERVICE-MATCHING-CORE
eureka.client.serviceUrl.defaultZone=http://127.0.0.1:17000/eureka/
spring.kafka.bootstrap-servers=127.0.0.1:9092
spring.kafka.consumer.group-id=matching-core-service
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.consumer.auto-offset-reset=latest

spring.datasource.url=jdbc:mysql://127.0.0.1:3306/bizzan?characterEncoding=utf-8&useSSL=false&serverTimezone=GMT%2B8
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=none

spring.data.mongodb.uri=mongodb://127.0.0.1:27017/bitrade

spring.redis.host=127.0.0.1
spring.redis.port=6379
spring.redis.password=

spring.session.store-type=none

es.username=
es.password=
es.mine.index=
es.mine.type=
es.public.ip=
es.private.ip=#
es.port=9200

spring.session.store-type=none

matching.core.snapshot-enabled=true
matching.core.journal-enabled=true
